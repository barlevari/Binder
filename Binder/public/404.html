<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>בינדר – הדף לא נמצא</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/css/styles.css?v=4">
</head>
<body>
  <div class="error-page">

      <div class="error-illustration">🔍</div>
      <div class="error-code">404</div>
      <h1 class="error-title">הדף לא נמצא</h1>
      <p class="error-description">
        נראה שהדף שחיפשת לא קיים או הועבר למקום אחר.<br>
        אולי הקישור שגוי, או שהדף הוסר.
      </p>

      <div class="error-actions">
        <a href="/" class="btn btn-primary btn-lg">חזרה לדף הבית</a>
        <button onclick="history.back()" class="btn btn-secondary btn-lg">חזרה אחורה</button>
      </div>

      <div class="error-links">
        <p>או עבור לאחד מהדפים הבאים:</p>
        <div class="quick-links">
          <a href="/discover.html" class="quick-link">גלה</a>
          <a href="/matches.html" class="quick-link">התאמות</a>
          <a href="/profile.html" class="quick-link">פרופיל</a>

        </div>
      </div>
    </div>
  </div>

</html>
