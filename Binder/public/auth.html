<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כניסה / הרשמה | בינדר</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="auth-page">
  <!-- LEFT PANEL -->
  <div class="auth-left">
    <div class="auth-illustration">🤝</div>
    <h2>ברוך הבא לבינדר</h2>
    <p>פלטפורמת עזרה הדדית שמחברת אנשים<br>
       עם ידע לאנשים שצריכים אותו</p>
  </div>

  <!-- RIGHT PANEL -->
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="auth-logo">בינדר ✦</div>
        <p style="color:var(--gray);margin-top:4px;">היכנס לחשבון שלך</p>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">כניסה</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">הרשמה</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">אימייל</label>
          <input type="email" id="loginEmail" class="input" placeholder="you@example.com" autocomplete="email" required>
          <span class="error-msg hidden" id="loginEmailErr"></span>
        </div>
        <div class="form-group">
          <label for="loginPassword">סיסמה</label>
          <div style="position:relative;">
            <input type="password" id="loginPassword" class="input" placeholder="הסיסמה שלך" autocomplete="current-password" required>
            <button type="button" class="btn-ghost btn-icon" id="toggleLoginPw"
              style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;"
              onclick="togglePw('loginPassword','toggleLoginPw')">👁</button>
          </div>
          <span class="error-msg hidden" id="loginPwErr"></span>
        </div>

        <div style="display:flex;justify-content:flex-start;margin-bottom:20px;">
          <a href="#" id="forgotLink" style="font-size:.85rem;color:var(--primary);" onclick="handleForgot(event)">שכחתי סיסמה</a>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
          כניסה
        </button>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signupForm" class="hidden" novalidate>
        <div class="form-group">
          <label for="signupEmail">אימייל</label>
          <input type="email" id="signupEmail" class="input" placeholder="you@example.com" autocomplete="email" required>
          <span class="error-msg hidden" id="signupEmailErr"></span>
        </div>
        <div class="form-group">
          <label for="signupPassword">סיסמה</label>
          <div style="position:relative;">
            <input type="password" id="signupPassword" class="input" placeholder="לפחות 8 תווים" autocomplete="new-password" required>
            <button type="button" class="btn-ghost btn-icon"
              style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;"
              onclick="togglePw('signupPassword', this)">👁</button>
          </div>
          <span class="error-msg hidden" id="signupPwErr"></span>
        </div>
        <div class="form-group">
          <label for="signupPasswordConfirm">אימות סיסמה</label>
          <input type="password" id="signupPasswordConfirm" class="input" placeholder="חזור על הסיסמה" autocomplete="new-password" required>
          <span class="error-msg hidden" id="signupPwConfirmErr"></span>
        </div>

        <div style="margin-bottom:20px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:400;color:var(--gray);font-size:.88rem;">
            <input type="checkbox" id="termsCheck" required style="width:16px;height:16px;cursor:pointer;">
            אני מאשר/ת את <a href="#" style="color:var(--primary);">תנאי השימוש</a> ו<a href="#" style="color:var(--primary);">מדיניות הפרטיות</a>
          </label>
          <span class="error-msg hidden" id="termsErr">יש לאשר את תנאי השימוש</span>
        </div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="signupBtn">
          יצירת חשבון
        </button>
      </form>

      <!-- DIVIDER -->
      <div class="divider">
        <span>או</span>
      </div>

      <button type="button" class="btn btn-secondary w-full" id="googleBtn" style="gap:8px;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        המשך עם Google
      </button>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { supabase } from '/js/config.js';
  import { toast, setLoading, validateEmail, validatePassword } from '/js/utils.js';

  // ── Check if already logged in ──────────────────────────────
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) redirectAfterAuth(session.user.id);
  });

  // ── Tab switching ────────────────────────────────────────────
  window.switchTab = function(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('signupForm').classList.toggle('hidden', isLogin);
    clearErrors();
  };

  // Auto-switch based on URL param
  const urlTab = new URLSearchParams(location.search).get('tab');
  if (urlTab === 'signup') switchTab('signup');

  // ── Password visibility toggle ───────────────────────────────
  window.togglePw = function(inputId, btnEl) {
    const input = document.getElementById(inputId);
    const btn   = typeof btnEl === 'string' ? document.getElementById(btnEl) : btnEl;
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  };

  // ── Clear errors ─────────────────────────────────────────────
  function clearErrors() {
    document.querySelectorAll('.error-msg').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.input.error').forEach(el => el.classList.remove('error'));
  }

  function showError(fieldEl, msgEl, msg) {
    fieldEl.classList.add('error');
    msgEl.textContent = msg;
    msgEl.classList.remove('hidden');
  }

  // ── Redirect helper ──────────────────────────────────────────
  async function redirectAfterAuth(userId) {
    const { data: profile } = await supabase
      .from('binder_profiles')
      .select('onboarding_complete')
      .eq('id', userId)
      .single();

    if (profile?.onboarding_complete) {
      window.location.href = '/discover.html';
    } else {
      window.location.href = '/onboarding.html';
    }
  }

  // ── LOGIN ────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPassword').value;
    const btn   = document.getElementById('loginBtn');

    let valid = true;
    if (!validateEmail(email)) {
      showError(
        document.getElementById('loginEmail'),
        document.getElementById('loginEmailErr'),
        'כתובת אימייל לא תקינה'
      );
      valid = false;
    }
    if (!pw) {
      showError(
        document.getElementById('loginPassword'),
        document.getElementById('loginPwErr'),
        'הסיסמה נדרשת'
      );
      valid = false;
    }
    if (!valid) return;

    setLoading(btn, true);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pw });
    setLoading(btn, false, 'כניסה');

    if (error) {
      const msg = error.message.includes('Invalid') ? 'אימייל או סיסמה שגויים' : error.message;
      toast(msg, 'error');
      return;
    }

    toast('ברוך הבא! 👋', 'success');
    await redirectAfterAuth(data.user.id);
  });

  // ── SIGN UP ──────────────────────────────────────────────────
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();

    const email    = document.getElementById('signupEmail').value.trim();
    const pw       = document.getElementById('signupPassword').value;
    const pwConf   = document.getElementById('signupPasswordConfirm').value;
    const terms    = document.getElementById('termsCheck').checked;
    const btn      = document.getElementById('signupBtn');

    let valid = true;

    if (!validateEmail(email)) {
      showError(document.getElementById('signupEmail'), document.getElementById('signupEmailErr'), 'כתובת אימייל לא תקינה');
      valid = false;
    }
    if (!validatePassword(pw)) {
      showError(document.getElementById('signupPassword'), document.getElementById('signupPwErr'), 'הסיסמה חייבת להכיל לפחות 8 תווים');
      valid = false;
    }
    if (pw !== pwConf) {
      showError(document.getElementById('signupPasswordConfirm'), document.getElementById('signupPwConfirmErr'), 'הסיסמאות אינן תואמות');
      valid = false;
    }
    if (!terms) {
      document.getElementById('termsErr').classList.remove('hidden');
      valid = false;
    }
    if (!valid) return;

    setLoading(btn, true);
    const { data, error } = await supabase.auth.signUp({ email, password: pw });
    setLoading(btn, false, 'יצירת חשבון');

    if (error) {
      if (error.message.includes('already registered')) {
        toast('אימייל זה כבר רשום. נסה להיכנס.', 'warning');
        switchTab('login');
      } else {
        toast(error.message, 'error');
      }
      return;
    }

    toast('נרשמת בהצלחה! 🎉', 'success');
    window.location.href = '/onboarding.html';
  });

  // ── GOOGLE ───────────────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', async () => {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${location.origin}/onboarding.html` },
    });
    if (error) toast(error.message, 'error');
  });

  // ── FORGOT PASSWORD ──────────────────────────────────────────
  window.handleForgot = async function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    if (!validateEmail(email)) {
      toast('הכנס כתובת אימייל תחילה', 'warning');
      document.getElementById('loginEmail').focus();
      return;
    }
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: `${location.origin}/auth.html`,
    });
    if (error) { toast(error.message, 'error'); return; }
    toast('קישור לאיפוס סיסמה נשלח לאימייל שלך', 'success');
  };
</script>
</body>
</html>
